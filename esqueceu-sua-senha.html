<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canto do Saber - Recuperar Senha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-card">
        <div class="logo-container">
            <img src="./images/Captura de tela 2026-06-24 075903.png" alt="Logo">
            <h2>Canto do saber</h2>
        </div>

        <p class="description-text">Insira o seu e-mail cadastrado para enviarmos as instruções de recuperação de senha.</p>

        <form class="auth-form" action="inserir-codigo.html">
            <div class="input-group">
                <label for="recover-email">E-mail</label>
                <input type="email" id="recover-email" required>
            </div>

            <button type="submit" class="btn-primary">Recuperar Senha</button>
        </form>

        <div class="divider">Ou</div>

        <p class="footer-text"><a href="tela-de-login.html">Voltar para o login</a></p>
    </div>

</body>
</html>
