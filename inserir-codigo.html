<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canto do Saber - Verificar Código</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-card">
        <div class="logo-container">
            <img src="./images/Captura de tela 2026-06-24 075903.png" alt="Logo">
            <h2>Canto do saber</h2>
        </div>

        <p class="description-text">Digite o código de verificação enviado para o seu e-mail.</p>

        <form class="auth-form" action="#">
            <div class="input-group">
                <label for="verification-code">Código de Verificação</label>
                <input type="text" id="verification-code" placeholder="000000" required>
            </div>

            <button type="submit" class="btn-primary">Verificar Código</button>
        </form>

        <div class="divider">Ou</div>

        <p class="footer-text"><a href="tela-de-login.html">Voltar para o login</a></p>
    </div>

</body>
</html>
